name: ci
on: [push, pull_request]

# CI can read the repository; publishing/deployment belongs in a separate, explicitly-approved workflow.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: learn_fullstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d learn_fullstack"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://dev:dev@localhost:5432/learn_fullstack?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-32
      JWT_SECRET: ci-secret-ci-secret-ci-secret-32
    steps:
      # Immutable revisions verified from each action's signed v4 release.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - run: pnpm storybook:build
      - run: pnpm audit --prod --audit-level critical
      - name: Install Chromium for browser checks
        if: matrix.node == 22
        run: pnpm --filter @learn-fullstack/kanban-web exec playwright install --with-deps chromium
      - name: Browser and accessibility smoke test
        if: matrix.node == 22
        run: pnpm test:e2e
      - run: pnpm docs:sync
      # exercise the Postgres service: apply the schema and run the seed
      # (Prisma 7 dropped `--skip-generate`: `db push` never runs generate anymore)
      - run: pnpm --filter @learn-fullstack/db exec prisma db push
      - run: pnpm db:seed
