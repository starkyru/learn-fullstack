# ARTIFACT — mirrors the output of `toYaml(buildCIWorkflow())` (solution/03-ci.ts).
# Documented by the module; the GATE does not run this workflow.
name: "CI"
on:
  push:
    branches:
      - "main"
  pull_request: {}
jobs:
  build:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        node:
          - 20
          - 22
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
      - name: "Setup pnpm"
        uses: "pnpm/action-setup@v4"
      - name: "Setup Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: "${{ matrix.node }}"
          cache: "pnpm"
      - name: "Cache turbo"
        uses: "actions/cache@v4"
        with:
          path: ".turbo"
          key: "${{ runner.os }}-turbo-${{ github.sha }}"
          restore-keys: "${{ runner.os }}-turbo-"
      - name: "Install"
        run: "pnpm install --frozen-lockfile"
      - name: "Typecheck"
        run: "pnpm turbo run typecheck"
      - name: "Lint"
        run: "pnpm turbo run lint"
      - name: "Test"
        run: "pnpm turbo run test"
      - name: "Build"
        run: "pnpm turbo run build"
